name: Build luci-app-campusportal

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sdk:
          - 22.03.7
          - SNAPSHOT

    steps:
      - uses: actions/checkout@v6

      - name: Cache SDK
        uses: actions/cache@v5
        with:
          path: /opt/openwrt-sdk-x86_64-${{ matrix.sdk }}
          key: sdk-x86_64-${{ matrix.sdk }}

      - name: Build package
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: luci-app-campusportal
          NO_REFRESH_CHECK: 1
          NO_SHFMT_CHECK: 1

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.sdk }}
          path: bin/packages/x86_64/packages_ci/*.ipk

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect packages
        run: |
          mkdir release
          find artifacts -type f \( -name '*.ipk' -o -name '*.apk' \) -exec cp {} release/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body: |
            ## luci-app-campusportal ${{ github.ref_name }}

            Architecture-independent package (all architectures)

            - 22.03.7 — `luci-app-campusportal*.ipk`
            - SNAPSHOT — `luci-app-campusportal*.apk`

            Install: `opkg install luci-app-campusportal*.ipk`