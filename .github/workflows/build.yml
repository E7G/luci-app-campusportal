name: Build luci-app-campusportal

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release version tag (leave empty to skip release)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_generic
          - arm_cortex-a7
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a9
          - arm_cortex-a9_vfpv3-d16
          - mips_24kc
          - mipsel_24kc
          - mipsel_74kc
          - x86_64
        sdk:
          - 22.03.7
          - SNAPSHOT

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache OpenWrt SDK
        uses: actions/cache@v5
        with:
          path: |
            /opt/openwrt-sdk-${{ matrix.arch }}-${{ matrix.sdk }}
            dl
          key: sdk-${{ matrix.arch }}-${{ matrix.sdk }}

      - name: Create i18n uci-defaults file
        run: |
          mkdir -p luci-app-campusportal/root/etc/uci-defaults
          cat > luci-app-campusportal/root/etc/uci-defaults/luci-i18n-campusportal-zh-cn << 'EOF'
          #!/bin/sh
          uci -q batch << EOI
          set luci.languages.zh_cn='简体中文 (Simplified Chinese)'
          commit luci
          EOI
          rm -f /tmp/luci-indexcache /tmp/luci-modulecache/*
          exit 0
          EOF
          chmod +x luci-app-campusportal/root/etc/uci-defaults/luci-i18n-campusportal-zh-cn

      - name: Building packages
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: luci-app-campusportal
          NO_REFRESH_CHECK: 1
          NO_SHFMT_CHECK: 1
          MAKEFLAGS: -j$(nproc)
          V: s

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.arch }}-${{ matrix.sdk }}
          path: bin/packages/${{ matrix.arch }}/packages_ci/*

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Determine tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release packages
        run: |
          sudo timedatectl set-timezone "Asia/Shanghai"
          mkdir -p release
          for dir in artifacts/*; do
            name=$(basename "$dir")
            zip -j "release/luci-app-campusportal-${{ steps.tag.outputs.tag }}-${name}.zip" "$dir"/*.ipk "$dir"/*.apk 2>/dev/null || true
          done
          echo "build_time=$(TZ=UTC-8 date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.tag.outputs.tag }}
          body: |
            ## luci-app-campusportal ${{ steps.tag.outputs.tag }}

            > Build time: ${{ env.build_time }}

            - **22.03.7** directory contains `.ipk` packages
            - **SNAPSHOT** directory contains `.apk` packages

            For APK packages, install with:
            ```
            apk add --allow-untrusted luci-app-campusportal.apk
            ```

            For IPK packages, install with:
            ```
            opkg install luci-app-campusportal.ipk
            ```
          files: release/*.zip